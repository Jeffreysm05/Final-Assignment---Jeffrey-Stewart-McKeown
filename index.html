<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Map Project</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/esri-leaflet@3.0.10/dist/esri-leaflet.js"></script>
    <style>
        body { margin:0; padding:0; }
        #map { position: absolute; top:0; bottom:0; width: 100%; }
    </style>
</head>
<body>
<div id="map"></div>
<script>
    var map = L.map('map').setView([43.3248, -79.8148], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    var myLayer = L.esri.featureLayer({
        url: 'https://mohawkarcgis.maps.arcgis.com/apps/mapviewer/index.html?webmap=e2680e8acb2549ab9242adf29d450daa'
    }).addTo(map);

    myLayer.bindPopup(function (layer) {
        return L.Util.template('<strong>{Municipality}</strong>', layer.feature.properties);
    });
</script>
</body>
</html>
